<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="mic-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="256" height="256" rx="48" fill="#0b1020"/>
  <rect width="256" height="256" rx="48" fill="url(#mic-grad)" opacity="0.12"/>

  <!-- Microphone body -->
  <g transform="translate(80, 64)">
    <!-- Mic capsule body -->
    <rect x="28" y="0" width="48" height="72" rx="24" fill="none" stroke="#60a5fa" stroke-width="8" stroke-linejoin="round"/>
    <!-- Mic capsule filled highlight -->
    <rect x="36" y="8" width="32" height="56" rx="16" fill="#60a5fa" opacity="0.2"/>

    <!-- Mic top dome line -->
    <path d="M28 24 Q28 4 52 4 Q76 4 76 24" fill="none" stroke="#60a5fa" stroke-width="8" stroke-linecap="round"/>

    <!-- Mic base arc -->
    <path d="M28 56 Q28 82 52 86 Q76 82 76 56" fill="none" stroke="#60a5fa" stroke-width="8" stroke-linecap="round"/>

    <!-- Stand line -->
    <line x1="52" y1="86" x2="52" y2="104" stroke="#60a5fa" stroke-width="7" stroke-linecap="round"/>
    <!-- Stand arc -->
    <path d="M24 112 Q52 120 80 112" fill="none" stroke="#60a5fa" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- GPT/AI sparkle node - top right -->
  <g transform="translate(156, 72)">
    <!-- Outer ring -->
    <circle cx="28" cy="28" r="28" fill="none" stroke="#60a5fa" stroke-width="5" opacity="0.6"/>
    <!-- Inner nodes -->
    <circle cx="28" cy="28" r="8" fill="#60a5fa"/>
    <!-- Orbital paths -->
    <circle cx="28" cy="28" r="18" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.4" stroke-dasharray="4,6">
      <animateTransform attributeName="transform" type="rotate" from="0 28 28" to="360 28 28" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Orbital electron -->
    <circle cx="46" cy="28" r="4" fill="#93c5fd" opacity="0.9">
      <animateTransform attributeName="transform" type="rotate" from="0 28 28" to="360 28 28" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>