name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix (for example, 0.1.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
      - name: Build release archives
        shell: pwsh
        run: ./scripts/build-release.ps1 -Version '${{ inputs.version }}'
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v${{ inputs.version }}" releases/*.zip --target "${{ github.sha }}" --title "GoDict v${{ inputs.version }}" --generate-notes
