name: Build and release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix
        required: true
        type: string
      create_release:
        description: Create a tagged GitHub Release after building
        required: true
        default: false
        type: boolean
      build_windows_arm64:
        description: Also Docker-cross-build Windows ARM64
        required: true
        default: false
        type: boolean
      title:
        description: Release title (required only when creating a release)
        required: false
        type: string
      description:
        description: Release description in Markdown (required only when creating a release)
        required: false
        type: string

permissions:
  contents: write

jobs:
  native-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-amd64
            runner: windows-latest
          - target: linux-amd64
            runner: ubuntu-latest
          - target: darwin-arm64
            runner: macos-14
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.24.x' }
      - name: Install Linux Fyne prerequisites
        if: matrix.target == 'linux-amd64'
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev
      - name: Build native archive
        shell: pwsh
        run: ./scripts/build-github-release.ps1 -Version '${{ inputs.version }}' -Target '${{ matrix.target }}'
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: releases/*.zip
          if-no-files-found: error

  windows-arm64:
    if: inputs.build_windows_arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.24.x' }
      - name: Build Windows ARM64 archive with Docker
        shell: pwsh
        run: ./scripts/build-github-release.ps1 -Version '${{ inputs.version }}' -Target windows-arm64 -WindowsArm64Docker
      - uses: actions/upload-artifact@v4
        with:
          name: windows-arm64
          path: releases/*.zip
          if-no-files-found: error

  release:
    if: ${{ always() && inputs.create_release && needs.native-build.result == 'success' && (needs.windows-arm64.result == 'success' || needs.windows-arm64.result == 'skipped') }}
    needs: [native-build, windows-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: releases, merge-multiple: true }
      - name: Validate release metadata
        env:
          TITLE: ${{ inputs.title }}
          DESCRIPTION: ${{ inputs.description }}
        run: test -n "$TITLE" && test -n "$DESCRIPTION"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: ${{ inputs.title }}
          DESCRIPTION: ${{ inputs.description }}
        run: gh release create "v${{ inputs.version }}" releases/*.zip --target "${{ github.sha }}" --title "$TITLE" --notes "$DESCRIPTION"
